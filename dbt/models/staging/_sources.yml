version: 2

sources:
  - name: silver
    description: >
      Validated Parquet written by the parser Lambda (src/parser/handler.py).
      Declared as a source, not a model — dbt does not own this data, the
      Lambda does. Partitioned by jurisdiction and year (Hive-style).
    database: awsdatacatalog
    schema: legal_lakehouse

    tables:
      - name: silver_judgments
        description: One row per legal document that passed Pydantic validation.
        # Cast for the same reason as stg_judgments.ingested_at:
        # from_iso8601_timestamp() yields a timezone-aware timestamp that
        # Hive-format tables reject. Values are already UTC.
        loaded_at_field: "cast(from_iso8601_timestamp(ingested_at) as timestamp)"
        freshness:
          # Used on Day 3 via `dbt source freshness`. Generous bounds
          # because this is a batch pipeline run on demand, not a
          # continuous feed.
          warn_after: { count: 24, period: hour }
          error_after: { count: 72, period: hour }
        columns:
          - name: doc_id
            description: SHA-256 of source_url. Deterministic — the idempotency key.
            tests:
              - not_null
              - unique
          - name: jurisdiction
            description: Partition key. Australian jurisdiction code, lowercase snake_case.
            tests:
              - not_null
          - name: year
            description: Partition key. 4-digit year as string, or 'unknown' when the source had no parseable date.
            tests:
              - not_null
          - name: doc_type
            description: One of primary_legislation, secondary_legislation, bill, decision.
          - name: court
            description: Derived from the citation's neutral-citation abbreviation. Null for non-decision doc types.
          - name: citation
            description: Document title, with jurisdiction abbreviation appended for legislation.
          - name: decision_date
            description: ISO-8601 date string, or null.
          - name: source_url
            description: Canonical URL of the source document.
          - name: text
            description: Full extracted document text.
          - name: text_length
            description: Character count of text.
          - name: ingested_at
            description: UTC timestamp the parser processed this record.
