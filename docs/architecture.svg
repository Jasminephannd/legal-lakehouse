<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" width="1180" height="620" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="1180" height="620" fill="#ffffff"/>

  <text x="32" y="42" font-size="22" font-weight="700" fill="#111827">legal-lakehouse — serverless medallion pipeline</text>
  <text x="32" y="66" font-size="13" fill="#6b7280">Australian legal corpus → bronze → silver → gold (star schema). Region ap-southeast-2. All infrastructure in Terraform.</text>

  <!-- Layer bands -->
  <rect x="32" y="92" width="1116" height="104" rx="8" fill="#fdf6ec" stroke="#e6cba8"/>
  <text x="48" y="116" font-size="12" font-weight="700" fill="#a1662f" letter-spacing="1">BRONZE — raw, immutable</text>

  <rect x="32" y="212" width="1116" height="104" rx="8" fill="#f2f4f7" stroke="#c9ced6"/>
  <text x="48" y="236" font-size="12" font-weight="700" fill="#5b6472" letter-spacing="1">SILVER — validated, partitioned Parquet</text>

  <rect x="32" y="332" width="1116" height="124" rx="8" fill="#fdf9e7" stroke="#ded29a"/>
  <text x="48" y="356" font-size="12" font-weight="700" fill="#8a7620" letter-spacing="1">GOLD — dimensional model (dbt)</text>

  <rect x="32" y="472" width="1116" height="118" rx="8" fill="#f4f7fb" stroke="#c3d0e2"/>
  <text x="48" y="496" font-size="12" font-weight="700" fill="#41597d" letter-spacing="1">CI/CD + ORCHESTRATION</text>

  <!-- BRONZE ROW -->
  <rect x="60" y="128" width="176" height="52" rx="6" fill="#ffffff" stroke="#c8a26f" stroke-width="1.5"/>
  <text x="148" y="150" font-size="13" font-weight="600" text-anchor="middle" fill="#111827">HuggingFace corpus</text>
  <text x="148" y="167" font-size="11" text-anchor="middle" fill="#6b7280">isaacus/open-aus-legal</text>

  <path d="M236 154 H 292" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="292" y="128" width="176" height="52" rx="6" fill="#ffffff" stroke="#c8a26f" stroke-width="1.5"/>
  <text x="380" y="150" font-size="13" font-weight="600" text-anchor="middle" fill="#111827">src/ingest/run.py</text>
  <text x="380" y="167" font-size="11" text-anchor="middle" fill="#6b7280">stratified sample, 2,000 docs</text>

  <path d="M468 154 H 524" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="524" y="128" width="248" height="52" rx="6" fill="#ffffff" stroke="#c8a26f" stroke-width="1.5"/>
  <text x="648" y="148" font-size="13" font-weight="600" text-anchor="middle" fill="#111827">S3  bronze/ingest_date=…/</text>
  <text x="648" y="166" font-size="11" text-anchor="middle" fill="#6b7280">gzipped JSONL, 250/batch + manifest.json</text>

  <rect x="800" y="128" width="188" height="52" rx="6" fill="#ffffff" stroke="#c8a26f" stroke-dasharray="4 3"/>
  <text x="894" y="150" font-size="12" text-anchor="middle" fill="#6b7280">30-day lifecycle expiry</text>
  <text x="894" y="167" font-size="11" text-anchor="middle" fill="#9ca3af">re-fetchable, not a source of truth</text>

  <!-- bronze -> silver -->
  <path d="M648 180 V 212" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="660" y="202" font-size="11" fill="#6b7280">S3 ObjectCreated *.jsonl.gz</text>

  <!-- SILVER ROW -->
  <rect x="60" y="248" width="228" height="52" rx="6" fill="#ffffff" stroke="#98a1ae" stroke-width="1.5"/>
  <text x="174" y="268" font-size="13" font-weight="600" text-anchor="middle" fill="#111827">Lambda (container, arm64)</text>
  <text x="174" y="286" font-size="11" text-anchor="middle" fill="#6b7280">2048 MB · pyarrow · ECR image</text>

  <path d="M288 274 H 344" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="344" y="248" width="204" height="52" rx="6" fill="#ffffff" stroke="#98a1ae" stroke-width="1.5"/>
  <text x="446" y="268" font-size="13" font-weight="600" text-anchor="middle" fill="#111827">Pydantic ParsedDoc</text>
  <text x="446" y="286" font-size="11" text-anchor="middle" fill="#6b7280">doc_id = SHA-256(source_url)</text>

  <path d="M548 262 H 604" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrowgreen)"/>
  <text x="576" y="256" font-size="10" text-anchor="middle" fill="#16a34a">valid</text>

  <rect x="604" y="236" width="268" height="46" rx="6" fill="#ffffff" stroke="#98a1ae" stroke-width="1.5"/>
  <text x="738" y="254" font-size="12" font-weight="600" text-anchor="middle" fill="#111827">silver/jurisdiction=X/year=Y/*.parquet</text>
  <text x="738" y="271" font-size="11" text-anchor="middle" fill="#6b7280">Snappy · Hive partitions · deterministic keys</text>

  <path d="M548 288 H 604" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrowred)"/>
  <text x="576" y="304" font-size="10" text-anchor="middle" fill="#dc2626">invalid</text>

  <rect x="604" y="288" width="268" height="24" rx="6" fill="#ffffff" stroke="#e0a3a3" stroke-width="1.5"/>
  <text x="738" y="304" font-size="11" text-anchor="middle" fill="#111827">rejected/…  raw record + error message</text>

  <rect x="900" y="240" width="216" height="60" rx="6" fill="#ffffff" stroke="#98a1ae" stroke-dasharray="4 3"/>
  <text x="1008" y="260" font-size="12" font-weight="600" text-anchor="middle" fill="#111827">Glue table (explicit schema)</text>
  <text x="1008" y="277" font-size="11" text-anchor="middle" fill="#6b7280">silver_judgments · no crawler</text>
  <text x="1008" y="292" font-size="11" text-anchor="middle" fill="#6b7280">queried via Athena</text>

  <!-- silver -> gold -->
  <path d="M738 312 V 332" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="750" y="327" font-size="11" fill="#6b7280">dbt source</text>

  <!-- GOLD ROW -->
  <rect x="60" y="376" width="176" height="56" rx="6" fill="#ffffff" stroke="#c4b463" stroke-width="1.5"/>
  <text x="148" y="398" font-size="13" font-weight="600" text-anchor="middle" fill="#111827">stg_judgments</text>
  <text x="148" y="416" font-size="11" text-anchor="middle" fill="#6b7280">view · cast + standardise</text>

  <path d="M236 404 H 292" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="292" y="366" width="164" height="30" rx="5" fill="#ffffff" stroke="#c4b463" stroke-width="1.5"/>
  <text x="374" y="386" font-size="12" text-anchor="middle" fill="#111827">dim_jurisdiction</text>

  <rect x="292" y="404" width="164" height="30" rx="5" fill="#ffffff" stroke="#c4b463" stroke-width="1.5"/>
  <text x="374" y="424" font-size="12" text-anchor="middle" fill="#111827">dim_court</text>

  <rect x="292" y="418" width="164" height="0" rx="5" fill="none"/>
  <rect x="292" y="426" width="164" height="0" fill="none"/>

  <rect x="292" y="330" width="164" height="0" fill="none"/>
  <rect x="292" y="440" width="164" height="0" fill="none"/>

  <rect x="292" y="442" width="164" height="0" fill="none"/>

  <rect x="470" y="366" width="150" height="30" rx="5" fill="#ffffff" stroke="#c4b463" stroke-width="1.5"/>
  <text x="545" y="386" font-size="12" text-anchor="middle" fill="#111827">dim_date</text>

  <path d="M456 381 H 470" stroke="#9ca3af" stroke-width="1.2"/>

  <rect x="470" y="404" width="150" height="30" rx="5" fill="#fffdf2" stroke="#a99a3f" stroke-width="2"/>
  <text x="545" y="424" font-size="12" font-weight="700" text-anchor="middle" fill="#111827">fct_judgment</text>

  <path d="M456 419 H 470" stroke="#9ca3af" stroke-width="1.2"/>

  <text x="640" y="400" font-size="11" fill="#6b7280">incremental · unique_key=doc_id</text>
  <text x="640" y="416" font-size="11" fill="#6b7280">surrogate keys · relationships tests</text>

  <rect x="856" y="376" width="260" height="56" rx="6" fill="#ffffff" stroke="#c4b463" stroke-width="1.5"/>
  <text x="986" y="398" font-size="13" font-weight="600" text-anchor="middle" fill="#111827">agg_judgments_by_court_year</text>
  <text x="986" y="416" font-size="11" text-anchor="middle" fill="#6b7280">counts + length stats per court/year</text>

  <path d="M620 419 H 856" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- CI/CD ROW -->
  <rect x="60" y="512" width="200" height="56" rx="6" fill="#ffffff" stroke="#9fb3ce" stroke-width="1.5"/>
  <text x="160" y="534" font-size="13" font-weight="600" text-anchor="middle" fill="#111827">ci.yml (on PR)</text>
  <text x="160" y="552" font-size="11" text-anchor="middle" fill="#6b7280">ruff · pytest · tf validate · dbt parse</text>

  <rect x="288" y="512" width="220" height="56" rx="6" fill="#ffffff" stroke="#9fb3ce" stroke-width="1.5"/>
  <text x="398" y="534" font-size="13" font-weight="600" text-anchor="middle" fill="#111827">cd.yml (on merge to main)</text>
  <text x="398" y="552" font-size="11" text-anchor="middle" fill="#6b7280">OIDC · build+push · apply · dbt build</text>

  <rect x="536" y="512" width="196" height="56" rx="6" fill="#ffffff" stroke="#9fb3ce" stroke-width="1.5"/>
  <text x="634" y="534" font-size="13" font-weight="600" text-anchor="middle" fill="#111827">GitHub OIDC → IAM role</text>
  <text x="634" y="552" font-size="11" text-anchor="middle" fill="#6b7280">no long-lived AWS keys</text>

  <rect x="760" y="512" width="180" height="56" rx="6" fill="#ffffff" stroke="#9fb3ce" stroke-width="1.5"/>
  <text x="850" y="534" font-size="13" font-weight="600" text-anchor="middle" fill="#111827">CloudWatch</text>
  <text x="850" y="552" font-size="11" text-anchor="middle" fill="#6b7280">JSON logs · EMF metrics</text>

  <rect x="968" y="512" width="148" height="56" rx="6" fill="#ffffff" stroke="#9fb3ce" stroke-dasharray="4 3"/>
  <text x="1042" y="534" font-size="12" text-anchor="middle" fill="#6b7280">Step Functions</text>
  <text x="1042" y="551" font-size="11" text-anchor="middle" fill="#9ca3af">not built — see roadmap</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 z" fill="#9ca3af"/>
    </marker>
    <marker id="arrowgreen" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 z" fill="#16a34a"/>
    </marker>
    <marker id="arrowred" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 z" fill="#dc2626"/>
    </marker>
  </defs>
</svg>
