name: CD

on:
  push:
    branches: [main]

# The block everyone forgets. Without id-token: write, the OIDC handshake
# in configure-aws-credentials fails with an opaque credentials error.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-2
  ECR_REPOSITORY: legal-lakehouse-parser

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # configure-aws-credentials reports an empty role-to-assume and a
      # rejected OIDC trust policy with the identical, unhelpful message:
      # "Could not load credentials from any providers". This step
      # distinguishes them before we get there. It prints the secret's
      # LENGTH, never its value — an ARN isn't sensitive, but treating
      # every secret as opaque is the habit worth keeping.
      - name: Preflight — is the deploy role secret actually set?
        run: |
          LEN=$(printf %s "${{ secrets.AWS_DEPLOY_ROLE_ARN }}" | wc -c)
          echo "AWS_DEPLOY_ROLE_ARN length: $LEN"
          if [ "$LEN" -eq 0 ]; then
            echo "::error::AWS_DEPLOY_ROLE_ARN is empty or unset."
            echo "Check: Settings > Secrets and variables > Actions > *Repository secrets*"
            echo "(NOT Environment secrets — this job declares no environment, so those never resolve)."
            echo "Name must match exactly, no trailing spaces: AWS_DEPLOY_ROLE_ARN"
            exit 1
          fi
          echo "Secret is present. Any failure in the next step is the OIDC trust policy, not a missing secret."
          echo ""
          echo "--- OIDC claim GitHub will send ---"
          echo "github.repository : ${{ github.repository }}"
          echo "github.ref        : ${{ github.ref }}"
          echo "expected sub      : repo:${{ github.repository }}:ref:${{ github.ref }}"
          echo ""
          echo "This must match the sub condition in infra/main/oidc.tf EXACTLY."
          echo "IAM string conditions are case-sensitive."

      # The step above prints the *rendered workflow context* — what we
      # THINK the claim will be. This one fetches the real OIDC token and
      # decodes what GitHub actually put in it. Those can differ: a
      # repository or org can define a custom subject-claim template,
      # which silently changes `sub` while github.repository/github.ref
      # stay the same.
      #
      # Only the decoded aud/sub/iss/repository claims are printed, never
      # the token. The token is a short-lived credential; these claims are
      # just the repo name and audience, and they are exactly the values
      # the IAM trust policy compares against.
      - name: Decode the real OIDC token claims
        run: |
          TOKEN=$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com" \
            | jq -r '.value')

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::Could not fetch an OIDC token. Is 'id-token: write' set?"
            exit 1
          fi

          # JWT payload is the 2nd dot-delimited segment, base64url-encoded
          # and unpadded — pad it back to a multiple of 4 before decoding.
          PAYLOAD=$(echo "$TOKEN" | cut -d. -f2 | tr '_-' '/+')
          case $(( ${#PAYLOAD} % 4 )) in
            2) PAYLOAD="${PAYLOAD}==" ;;
            3) PAYLOAD="${PAYLOAD}=" ;;
          esac

          echo "--- ACTUAL claims in the issued token ---"
          echo "$PAYLOAD" | base64 -d 2>/dev/null \
            | jq '{iss, aud, sub, repository, repository_owner, ref, workflow}'
          echo ""
          echo "Compare 'aud' and 'sub' above against infra/main/oidc.tf."
          echo "If these differ from the rendered context printed earlier,"
          echo "a custom OIDC subject-claim template is configured on the repo/org."

      - name: Configure AWS credentials via OIDC
        # No long-lived secrets — this assumes a role scoped in
        # infra/main/oidc.tf to this repo's main branch only.
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push parser image
        # --provenance=false --sbom=false is REQUIRED, not optional:
        # Buildx's default attestations wrap the image in an OCI image
        # index, and Lambda only accepts a plain single-arch manifest.
        # Without these flags the push may succeed but the Lambda update
        # fails with "image manifest ... is not supported".
        #
        # Tagged with the commit SHA, never `latest` — combined with the
        # repo's IMMUTABLE tag policy, any deployed Lambda is traceable
        # back to exactly one commit.
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --provenance=false \
            --sbom=false \
            -f src/parser/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} \
            --push \
            .

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"

      - name: Terraform apply
        working-directory: infra/main
        run: |
          terraform init
          terraform apply -auto-approve -var="parser_image_tag=${{ github.sha }}"

      - name: Install dbt
        run: pip install -r requirements.txt

      - name: dbt build (prod)
        working-directory: dbt
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/dbt
          ATHENA_S3_STAGING_DIR: ${{ secrets.ATHENA_S3_STAGING_DIR }}
        run: |
          dbt deps
          dbt build --target prod
